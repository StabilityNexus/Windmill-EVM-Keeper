name: Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (for example v1.0.0). Leave empty to use current ref."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run tests
        run: npm test

      - name: Determine artifact version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package template files
        run: |
          tar -czf keeper-template-${{ steps.version.outputs.tag }}.tar.gz \
            src \
            test \
            .github/workflows \
            .env.example \
            .gitignore \
            .nvmrc \
            package.json \
            package-lock.json \
            README.md \
            CONTRIBUTING.md \
            LICENSE \
            VERSION

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeper-template-${{ steps.version.outputs.tag }}
          path: keeper-template-${{ steps.version.outputs.tag }}.tar.gz

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag' || inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          files: keeper-template-${{ steps.version.outputs.tag }}.tar.gz
          tag_name: ${{ inputs.version || github.ref_name }}
          draft: ${{ github.ref_type != 'tag' }}
